name: Daily Price Scrape

on:
  schedule:
    # Runs every day at 06:00 UTC (09:00 Greek summer time)
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Set to '1' to skip Firebase upload"
        required: false
        default: "0"

jobs:
  scrape:
    name: Scrape Greek Supermarkets
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: scraper/requirements.txt

      - name: Install dependencies
        run: pip install -r scraper/requirements.txt

      - name: Run scraper
        working-directory: scraper
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          DRY_RUN: ${{ github.event.inputs.dry_run || '0' }}
          SCRAPER_WORKERS: "4"
        run: python main.py
